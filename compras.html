<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iberdrola - Compras</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{--orange:#E65100;--green:#28A745;--blue:#007BFF;--petroleum:#2C3E50;--bg:#F5F6FA;--white:#FFFFFF;--shadow:0 4px 24px rgba(44,62,80,0.10);--radius:18px;--font:'Inter',sans-serif;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:var(--font);background:var(--bg);min-height:100vh;padding-bottom:88px;color:var(--petroleum);}
  .header{background:var(--petroleum);padding:18px 20px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:100;box-shadow:0 2px 16px rgba(44,62,80,0.15);}
  .header h1{font-size:1.1rem;font-weight:800;letter-spacing:-1px;color:white;flex:1;}
  .compras-count{background:var(--orange);color:white;font-size:.72rem;font-weight:800;padding:3px 10px;border-radius:20px;}
  .plan-tabs{display:flex;background:var(--white);padding:5px;gap:5px;margin:14px 16px 0;border-radius:14px;box-shadow:var(--shadow);}
  .plan-tab{flex:1;padding:11px 8px;text-align:center;border-radius:10px;font-size:.8rem;font-weight:700;cursor:pointer;border:none;font-family:var(--font);background:transparent;color:#aaa;transition:all .2s;}
  .plan-tab.active{background:var(--petroleum);color:white;box-shadow:0 3px 10px rgba(44,62,80,0.2);}
  .section-title{font-size:.73rem;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:1.5px;padding:16px 20px 10px;}
  .plan-list{padding:0 16px;display:flex;flex-direction:column;gap:14px;}
  .tab-panel{display:none;}

  /* PLAN CARD - bordas totalmente arredondadas */
  .plan-card{
    background:var(--white);
    border-radius:20px;
    box-shadow:var(--shadow);
    overflow:hidden;
    cursor:pointer;
    transition:transform .15s, box-shadow .15s;
    border:1.5px solid rgba(255,255,255,0.9);
  }
  .plan-card:active{transform:scale(.98);box-shadow:0 2px 10px rgba(44,62,80,0.08);}
  .plan-card-inner{display:flex;align-items:center;}
  .plan-thumb-wrap{width:88px;height:88px;flex-shrink:0;position:relative;overflow:hidden;border-radius:16px;margin:8px 0 8px 8px;}
  .plan-thumb{width:100%;height:100%;object-fit:cover;display:block;}
  .plan-body{flex:1;padding:12px 14px 12px 12px;min-width:0;}
  .plan-name{font-size:.85rem;font-weight:800;letter-spacing:-.5px;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .plan-badge-row{margin-bottom:8px;}
  .badge-ilimitado{background:rgba(0,123,255,0.1);color:var(--blue);font-size:.6rem;font-weight:700;padding:2px 8px;border-radius:6px;display:inline-block;}
  .badge-curto{background:rgba(230,81,0,0.1);color:var(--orange);font-size:.6rem;font-weight:700;padding:2px 8px;border-radius:6px;display:inline-block;}
  .plan-stats-row{display:flex;gap:14px;margin-bottom:9px;}
  .stat-inline .sv{font-size:.88rem;font-weight:900;letter-spacing:-.5px;}
  .stat-inline .sl{font-size:.59rem;color:#aaa;font-weight:600;margin-top:1px;}
  .sv-red{color:#e74c3c;}
  .sv-grn{color:var(--green);}
  .plan-footer-row{display:flex;align-items:center;justify-content:space-between;}
  .plan-cycle{font-size:.67rem;color:#bbb;font-weight:600;}

  /* Hint de toque */
  .plan-tap-hint{display:flex;align-items:center;gap:4px;font-size:.63rem;color:#bbb;font-weight:600;}
  .plan-tap-hint svg{width:11px;height:11px;fill:#bbb;}

  .btn-buy{background:var(--green);color:white;border:none;border-radius:10px;padding:8px 15px;font-size:.77rem;font-weight:800;font-family:var(--font);cursor:pointer;box-shadow:0 2px 8px rgba(40,167,69,0.3);transition:transform .15s;}
  .btn-buy:active{transform:scale(.95);}
  .btn-buy:disabled{background:#ccc;box-shadow:none;cursor:not-allowed;}

  /* SKELETON */
  .skeleton{background:linear-gradient(90deg,#e8e9ec 25%,#f5f5f7 50%,#e8e9ec 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:10px;}
  @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

  /* PLAN INFO BOTTOM SHEET */
  .info-overlay{position:fixed;inset:0;background:rgba(44,62,80,0.6);z-index:9000;display:none;align-items:flex-end;justify-content:center;}
  .info-overlay.open{display:flex;animation:fadeIn .25s;}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  .info-box{background:white;border-radius:24px 24px 0 0;padding:22px 22px 36px;width:100%;max-width:480px;animation:slideUp .3s ease;max-height:90vh;overflow-y:auto;}
  @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .info-handle{width:38px;height:4px;background:#ddd;border-radius:4px;margin:0 auto 18px;}
  .info-plan-header{display:flex;gap:14px;align-items:center;margin-bottom:18px;}
  .info-plan-img{width:70px;height:70px;border-radius:14px;object-fit:cover;flex-shrink:0;}
  .info-plan-name{font-size:1rem;font-weight:900;letter-spacing:-1px;color:var(--petroleum);margin-bottom:4px;}
  .info-plan-type{font-size:.68rem;font-weight:700;}

  /* Stats grid no popup */
  .info-stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
  .info-stat-card{background:#f5f6fa;border-radius:14px;padding:12px 11px;}
  .info-stat-card .sv{font-size:.95rem;font-weight:900;letter-spacing:-1px;margin-bottom:3px;}
  .info-stat-card .sl{font-size:.62rem;color:#aaa;font-weight:600;}
  .info-stat-card.green .sv{color:var(--green);}
  .info-stat-card.red .sv{color:#e74c3c;}
  .info-stat-card.blue .sv{color:var(--blue);}
  .info-stat-card.orange .sv{color:var(--orange);}

  /* Secao descricao */
  .info-section{margin-bottom:14px;}
  .info-section h4{font-size:.77rem;font-weight:800;color:var(--petroleum);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px;}
  .info-desc{font-size:.8rem;color:#555;line-height:1.6;}
  .info-feature-row{display:flex;gap:9px;align-items:flex-start;margin-bottom:7px;}
  .info-feature-icon{width:22px;height:22px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
  .info-feature-icon svg{width:12px;height:12px;fill:white;}
  .info-feature-text{font-size:.78rem;color:#555;line-height:1.45;}
  .info-feature-text strong{color:var(--petroleum);font-weight:700;}

  /* Botoes do popup */
  .info-btn-row{display:flex;gap:10px;margin-top:18px;}
  .btn-info-close{flex:1;padding:13px;background:var(--bg);color:var(--petroleum);border:none;border-radius:12px;font-size:.88rem;font-weight:700;font-family:var(--font);cursor:pointer;}
  .btn-info-buy{flex:2;padding:13px;background:var(--green);color:white;border:none;border-radius:12px;font-size:.88rem;font-weight:800;font-family:var(--font);cursor:pointer;box-shadow:0 3px 12px rgba(40,167,69,0.3);transition:transform .15s;}
  .btn-info-buy:active{transform:scale(.97);}
  .btn-info-buy:disabled{background:#ccc;box-shadow:none;}

  /* CONFIRM MODAL */
  .modal-overlay{position:fixed;inset:0;background:rgba(44,62,80,0.6);z-index:9999;display:none;align-items:flex-end;justify-content:center;}
  .modal-overlay.open{display:flex;}
  .modal-box{background:white;border-radius:24px 24px 0 0;padding:24px 22px 36px;width:100%;max-width:480px;animation:slideUp .3s ease;}
  .modal-handle{width:38px;height:4px;background:#ddd;border-radius:4px;margin:0 auto 16px;}
  .modal-box h2{font-size:.98rem;font-weight:800;letter-spacing:-1px;margin-bottom:14px;}
  .confirm-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid #f5f5f5;}
  .confirm-row:last-of-type{border-bottom:none;}
  .confirm-row .k{font-size:.77rem;color:#aaa;font-weight:600;}
  .confirm-row .v{font-size:.87rem;font-weight:800;color:var(--petroleum);}
  .modal-btns{display:flex;gap:10px;margin-top:16px;}
  .btn-cancel{flex:1;padding:13px;background:var(--bg);color:var(--petroleum);border:none;border-radius:12px;font-size:.88rem;font-weight:700;font-family:var(--font);cursor:pointer;}
  .btn-confirm{flex:2;padding:13px;background:var(--green);color:white;border:none;border-radius:12px;font-size:.88rem;font-weight:800;font-family:var(--font);cursor:pointer;box-shadow:0 3px 12px rgba(40,167,69,0.3);transition:transform .15s;}
  .btn-confirm:active{transform:scale(.97);}
  .btn-confirm:disabled{background:#ccc;box-shadow:none;}

  /* ALERT */
  .alert-overlay{position:fixed;inset:0;background:rgba(44,62,80,0.45);z-index:10001;display:none;align-items:center;justify-content:center;}
  .alert-overlay.open{display:flex;}
  .alert-box{background:rgba(255,255,255,0.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1.5px solid rgba(230,81,0,0.2);border-radius:20px;padding:26px 22px;max-width:295px;width:90%;text-align:center;box-shadow:0 8px 32px rgba(230,81,0,0.14);animation:popIn .3s cubic-bezier(.34,1.56,.64,1);}
  @keyframes popIn{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}
  .alert-icon{width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;}
  .alert-icon.warn{background:rgba(230,81,0,0.1);}
  .alert-icon.ok{background:rgba(40,167,69,0.1);}
  .alert-icon.fail{background:rgba(231,76,60,0.1);}
  .alert-icon svg{width:24px;height:24px;}
  .alert-box h3{font-size:.97rem;font-weight:900;letter-spacing:-1px;margin-bottom:6px;color:var(--petroleum);}
  .alert-box p{font-size:.8rem;color:#666;line-height:1.5;margin-bottom:14px;}
  .btn-alert-ok{width:100%;padding:12px;background:var(--orange);color:white;border:none;border-radius:12px;font-size:.88rem;font-weight:800;font-family:var(--font);cursor:pointer;box-shadow:0 3px 12px rgba(230,81,0,0.25);transition:transform .15s;}
  .btn-alert-ok:active{transform:scale(.97);}

  .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--white);border-top:1px solid #eee;display:flex;height:68px;box-shadow:0 -4px 24px rgba(44,62,80,0.08);z-index:200;}
  .nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;text-decoration:none;}
  .nav-item svg{width:22px;height:22px;}
  .nav-item span{font-size:.68rem;font-weight:600;}
  .nav-item.active{color:var(--orange);}
  .nav-item:not(.active){color:#aaa;}
</style>
</head>

</div>

<div class="plan-tabs">

  <button class="plan-tab" onclick="switchPlanTab('curto')">Curto Prazo 30 dias</button>
</div>

<div id="skeletonWrap" style="padding:16px 16px 0">
  <div style="background:white;border-radius:20px;box-shadow:0 2px 12px rgba(44,62,80,0.08);display:flex;overflow:hidden;margin-bottom:14px;gap:0"><div style="margin:8px 0 8px 8px;width:88px;height:88px;flex-shrink:0"><div class="skeleton" style="width:88px;height:88px;border-radius:16px"></div></div><div style="flex:1;padding:14px"><div class="skeleton" style="height:13px;width:72%;margin-bottom:10px"></div><div class="skeleton" style="height:11px;width:40%"></div></div></div>
  <div style="background:white;border-radius:20px;box-shadow:0 2px 12px rgba(44,62,80,0.08);display:flex;overflow:hidden;margin-bottom:14px;gap:0"><div style="margin:8px 0 8px 8px;width:88px;height:88px;flex-shrink:0"><div class="skeleton" style="width:88px;height:88px;border-radius:16px"></div></div><div style="flex:1;padding:14px"><div class="skeleton" style="height:13px;width:60%;margin-bottom:10px"></div><div class="skeleton" style="height:11px;width:50%"></div></div></div>
  <div style="background:white;border-radius:20px;box-shadow:0 2px 12px rgba(44,62,80,0.08);display:flex;overflow:hidden;gap:0"><div style="margin:8px 0 8px 8px;width:88px;height:88px;flex-shrink:0"><div class="skeleton" style="width:88px;height:88px;border-radius:16px"></div></div><div style="flex:1;padding:14px"><div class="skeleton" style="height:13px;width:80%;margin-bottom:10px"></div><div class="skeleton" style="height:11px;width:35%"></div></div></div>

<div class="tab-panel" id="panel-curto" style="display:none">

<!-- PLAN INFO POPUP -->
<div class="info-overlay" id="infoModal">
  <div class="info-box">
    <div class="info-handle"></div>
    <div class="info-plan-header">
      <img class="info-plan-img" id="ipImg" src="" alt="">
      <div>
        <div class="info-plan-name" id="ipNome"></div>
        <div class="info-plan-type" id="ipType"></div>
      </div>
    </div>
    <div class="info-stats-grid" id="ipStats"></div>
    <div class="info-section">
      <h4>Sobre este Plano</h4>
      <div class="info-desc" id="ipDesc"></div>
    </div>
    <div class="info-section" id="ipFeaturesSection">
      <h4>Caracteristicas</h4>
      <div id="ipFeatures"></div>
    </div>
    <div class="info-btn-row">
      <button class="btn-info-close" onclick="closeInfoModal()">Fechar</button>
      <button class="btn-info-buy" id="btnInfoBuy" onclick="proceedFromInfo()">Comprar Plano</button>
    </div>
  </div>
</div>

<!-- CONFIRM MODAL -->
<div class="modal-overlay" id="confirmModal">
  <div class="modal-box">
    <div class="modal-handle"></div>
    <h2>Confirmar Compra</h2>
    <div class="confirm-row"><span class="k">Plano</span><span class="v" id="cNome">-</span></div>
    <div class="confirm-row"><span class="k">Investimento</span><span class="v" id="cValor" style="color:#e74c3c">-</span></div>
    <div class="confirm-row" id="cRendaRow"><span class="k">Renda Diaria</span><span class="v" id="cRenda" style="color:var(--green)">-</span></div>
    <div class="confirm-row" id="cRetornoRow" style="display:none"><span class="k">Retorno Final</span><span class="v" id="cRetorno" style="color:var(--green)">-</span></div>
    <div class="confirm-row"><span class="k">Validade</span><span class="v" id="cValidade">-</span></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeConfirm()">Cancelar</button>
      <button class="btn-confirm" id="btnConfirm" onclick="confirmarCompra()">Confirmar</button>
    </div>
  </div>
</div>

<!-- ALERT MODAL -->
<div class="alert-overlay" id="alertModal">
  <div class="alert-box">
    <div class="alert-icon" id="alertIcon"></div>
    <h3 id="alertTitle"></h3>
    <p id="alertMsg"></p>
    <button class="btn-alert-ok" onclick="document.getElementById('alertModal').classList.remove('open')">OK</button>
  </div>
</div>

    },
    {
      id:'plano7000',nome:'Biomassa',img:'https://i.postimg.cc/PxxbF3cD/images-(7).jpg',
      valor:7000,rendaDiaria:630,tipo:'Ilimitado',
      descricao:'Centrais de biomassa florestal que convertem residuos organicos em energia electrica. Fonte de energia base com producao continua 24 horas independente das condicoes climaticas.',
      features:[
        {icon:'#28A745',texto:'Renda diaria de <strong>630 MT</strong> todos os dias uteis'},
        {icon:'#007BFF',texto:'Producao continua 24h — nao depende do clima'},
        {icon:'#E65100',texto:'Combustivel renovavel com rastreabilidade certificada'},
        {icon:'#2C3E50',texto:'Cumpre normas internacionais de sustentabilidade'},
      ]
    },
  ];

  const planosCurto=[
    {
      id:'curto1000',nome:'Hidrogenio Verde (H2V)',img:'https://i.postimg.cc/NjBdk4gk/images-(8).jpg',
      valor:1000,retorno:1090,tipo:'Curto Prazo',
      descricao:'Projeto pioneiro de producao de hidrogenio verde atraves de electrolise alimentada por energia renovavel. Receba 1.090 MT ao final de 30 dias, gerando lucro de 90 MT.',
      features:[
        {icon:'#28A745',texto:'Retorno de <strong>1.090 MT</strong> ao final de 30 dias'},
        {icon:'#007BFF',texto:'Lucro liquido de <strong>90 MT</strong> sobre o investimento'},
        {icon:'#E65100',texto:'Tecnologia do futuro com alto potencial de crescimento'},
        {icon:'#2C3E50',texto:'Credito automatico no 30 dia util apos compra'},
      ]
    },
    {
      id:'curto16000',nome:'Armazenamento de Energia',img:'https://i.postimg.cc/9FW9xN7j/50-4.webp',
      valor:16000,retorno:17440,tipo:'Curto Prazo',
      descricao:'Sistemas de armazenamento de energia em grande escala (BESS). Baterias de iao de litio que estabilizam a rede electrica. Receba 17.440 MT em 30 dias, lucro de 1.440 MT.',
      features:[
        {icon:'#28A745',texto:'Retorno de <strong>17.440 MT</strong> ao final de 30 dias'},
        {icon:'#007BFF',texto:'Lucro liquido de <strong>1.440 MT</strong> sobre o investimento'},
        {icon:'#E65100',texto:'Baterias com 10 anos de garantia operacional'},
        {icon:'#2C3E50',texto:'Projetos em operacao em 5 continentes'},
      ]
    },
    {
      id:'curto20000',nome:'Energia das Ondas e Mares',img:'https://i.postimg.cc/KvvK7k6D/images-(9).jpg',
      valor:20000,retorno:21800,tipo:'Curto Prazo',
      descricao:'Tecnologia de ultima geracao para conversao da energia cinetica das ondas oceanicas em electricidade. Receba 21.800 MT em 30 dias, lucro total de 1.800 MT.',
      features:[
        {icon:'#28A745',texto:'Retorno de <strong>21.800 MT</strong> ao final de 30 dias'},
        {icon:'#007BFF',texto:'Lucro liquido de <strong>1.800 MT</strong> sobre o investimento'},
        {icon:'#E65100',texto:'Energia inexaurivel das correntes oceanicas'},
        {icon:'#2C3E50',texto:'Unico no mercado com esta tecnologia certificada'},
      ]
    },
  ];

  function fmt(n){return n.toLocaleString('pt');}

  function renderPlans(list,containerId){
    const el=document.getElementById(containerId);
    el.innerHTML='';
    const total=userData?.planos?.length||0;
    list.forEach(p=>{
      const owned=userData?.planos?.some(x=>x.id===p.id)||false;
      const saldo=userData?.saldoDisponivel||0;
      const isIlimitado=p.tipo==='Ilimitado';
      let btnLabel='Comprar';let disabled=false;
      if(owned){btnLabel='Ja adquirido';disabled=true;}
      else if(total>=2){btnLabel='Limite atingido';disabled=true;}
      else if(saldo<p.valor){btnLabel='Saldo insuf.';disabled=true;}
      el.innerHTML+=`
      <div class="plan-card" onclick="openInfoModal('${p.id}','${isIlimitado?'ilimitado':'curto'}')">
        <div class="plan-card-inner">
          <div class="plan-thumb-wrap">
            <img class="plan-thumb" src="${p.img}" alt="${p.nome}" loading="lazy">
          </div>
          <div class="plan-body">
            <div class="plan-name">${p.nome}</div>
            <div class="plan-badge-row"><span class="${isIlimitado?'badge-ilimitado':'badge-curto'}">${p.tipo}</span></div>
            <div class="plan-stats-row">
              <div class="stat-inline">
                <div class="sv sv-red">${fmt(p.valor)} MT</div>
                <div class="sl">Investimento</div>
              </div>
              <div class="stat-inline">
                <div class="sv sv-grn">${isIlimitado?fmt(p.rendaDiaria)+'/dia':fmt(p.retorno)}</div>
                <div class="sl">${isIlimitado?'Renda Diaria':'Retorno Final'}</div>
              </div>
            </div>
            <div class="plan-footer-row">
              <div class="plan-tap-hint">
                <svg viewBox="0 0 24 24"><path d="M11 17H9V8h2v9zm4-9h-2v9h2V8zm4 0h-2v9h2V8zM1 21h22V3H1v18zM3 5h18v14H3V5z"/></svg>
                Toque para detalhes
              </div>
              <button class="btn-buy" ${disabled?'disabled':''} onclick="event.stopPropagation();openConfirm('${p.id}','${isIlimitado?'ilimitado':'curto'}')">${btnLabel}</button>
            </div>
          </div>
        </div>
      </div>`;
    });
  }

  // ---- INFO MODAL ----
  window.openInfoModal=(planId,tipo)=>{
    const list=tipo==='ilimitado'?planosIlimitado:planosCurto;
    selectedPlan=list.find(p=>p.id===planId);
    if(!selectedPlan)return;
    const p=selectedPlan;
    const isIlimitado=p.tipo==='Ilimitado';
    const owned=userData?.planos?.some(x=>x.id===p.id)||false;
    const total=userData?.planos?.length||0;
    const saldo=userData?.saldoDisponivel||0;

    document.getElementById('ipImg').src=p.img;
    document.getElementById('ipNome').textContent=p.nome;
    document.getElementById('ipType').innerHTML=`<span class="${isIlimitado?'badge-ilimitado':'badge-curto'}">${p.tipo}</span>`;

    let statsHtml='';
    statsHtml+=`<div class="info-stat-card red"><div class="sv">${fmt(p.valor)} MT</div><div class="sl">Investimento</div></div>`;
    if(isIlimitado){
      statsHtml+=`<div class="info-stat-card green"><div class="sv">${fmt(p.rendaDiaria)} MT</div><div class="sl">Renda Diaria</div></div>`;
      statsHtml+=`<div class="info-stat-card blue"><div class="sv">Sem limite</div><div class="sl">Validade</div></div>`;
      const mensal=p.rendaDiaria*22;
      statsHtml+=`<div class="info-stat-card orange"><div class="sv">~${fmt(mensal)} MT</div><div class="sl">Estimativa Mensal</div></div>`;
    } else {
      statsHtml+=`<div class="info-stat-card green"><div class="sv">${fmt(p.retorno)} MT</div><div class="sl">Retorno Final</div></div>`;
      statsHtml+=`<div class="info-stat-card blue"><div class="sv">30 Dias</div><div class="sl">Prazo</div></div>`;
      const lucro=p.retorno-p.valor;
      statsHtml+=`<div class="info-stat-card orange"><div class="sv">+${fmt(lucro)} MT</div><div class="sl">Lucro Liquido</div></div>`;
    }
    document.getElementById('ipStats').innerHTML=statsHtml;
    document.getElementById('ipDesc').textContent=p.descricao;

    let featHtml='';
    p.features.forEach(f=>{
      featHtml+=`<div class="info-feature-row">
        <div class="info-feature-icon" style="background:${f.icon}">
          <svg viewBox="0 0 24 24" fill="white"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
        </div>
        <div class="info-feature-text">${f.texto}</div>
      </div>`;
    });
    document.getElementById('ipFeatures').innerHTML=featHtml;

    const btnBuy=document.getElementById('btnInfoBuy');
    if(owned){btnBuy.textContent='Ja adquirido';btnBuy.disabled=true;}
    else if(total>=2){btnBuy.textContent='Limite atingido';btnBuy.disabled=true;}
    else if(saldo<p.valor){btnBuy.textContent='Saldo insuficiente';btnBuy.disabled=true;}
    else{btnBuy.textContent='Comprar Plano';btnBuy.disabled=false;}

    document.getElementById('infoModal').classList.add('open');
  };

  window.closeInfoModal=()=>{document.getElementById('infoModal').classList.remove('open');};
  document.getElementById('infoModal').addEventListener('click',e=>{if(e.target===document.getElementById('infoModal'))closeInfoModal();});

  window.proceedFromInfo=()=>{
    if(!selectedPlan)return;
    closeInfoModal();
    const isIlimitado=selectedPlan.tipo==='Ilimitado';
    if((userData?.saldoDisponivel||0)<selectedPlan.valor){showAlert('warn','Saldo Insuficiente','O seu saldo disponivel nao e suficiente para este plano.');return;}
    openConfirm(selectedPlan.id,isIlimitado?'ilimitado':'curto');
  };

  // ---- CONFIRM ----
  window.switchPlanTab=tab=>{
    document.querySelectorAll('.plan-tab').forEach((t,i)=>t.classList.toggle('active',(i===0&&tab==='ilimitado')||(i===1&&tab==='curto')));
    document.getElementById('panel-ilimitado').style.display=tab==='ilimitado'?'block':'none';
    document.getElementById('panel-curto').style.display=tab==='curto'?'block':'none';
  };

  window.openConfirm=(planId,tipo)=>{
    const list=tipo==='ilimitado'?planosIlimitado:planosCurto;
    selectedPlan=list.find(p=>p.id===planId);
    if(!selectedPlan)return;
    if((userData?.saldoDisponivel||0)<selectedPlan.valor){showAlert('warn','Saldo Insuficiente','O seu saldo disponivel nao e suficiente para este plano. Realize um deposito primeiro.');return;}
    document.getElementById('cNome').textContent=selectedPlan.nome;
    document.getElementById('cValor').textContent=fmt(selectedPlan.valor)+' MT';
    const isIlimitado=tipo==='ilimitado';
    document.getElementById('cValidade').textContent=isIlimitado?'Sem validade':'30 dias';
    if(isIlimitado){
      document.getElementById('cRendaRow').style.display='flex';
      document.getElementById('cRetornoRow').style.display='none';
      document.getElementById('cRenda').textContent=fmt(selectedPlan.rendaDiaria)+' MT / dia';
    } else {
      document.getElementById('cRendaRow').style.display='none';
      document.getElementById('cRetornoRow').style.display='flex';
      document.getElementById('cRetorno').textContent=fmt(selectedPlan.retorno)+' MT';
    }
    document.getElementById('confirmModal').classList.add('open');
  };

  window.closeConfirm=()=>{document.getElementById('confirmModal').classList.remove('open');selectedPlan=null;};

  window.confirmarCompra=async()=>{
    if(!selectedPlan||!currentUser)return;
    const btn=document.getElementById('btnConfirm');
    btn.disabled=true;btn.textContent='A processar...';
    try{
      const snap=await getDoc(doc(db,'users',currentUser.uid));
      const d=snap.data();
      if((d.saldoDisponivel||0)<selectedPlan.valor){closeConfirm();showAlert('warn','Saldo Insuficiente','Saldo disponivel insuficiente para esta compra.');btn.disabled=false;btn.textContent='Confirmar';return;}
      if((d.planos||[]).length>=2){closeConfirm();showAlert('warn','Limite Atingido','Apenas 2 planos por conta sao permitidos.');btn.disabled=false;btn.textContent='Confirmar';return;}
      if((d.planos||[]).some(x=>x.id===selectedPlan.id)){closeConfirm();showAlert('warn','Plano Existente','Ja possui este plano activo.');btn.disabled=false;btn.textContent='Confirmar';return;}
      await updateDoc(doc(db,'users',currentUser.uid),{
        planos:arrayUnion({...selectedPlan,dataCompra:new Date().toISOString(),ativo:true}),
        saldoDisponivel:(d.saldoDisponivel||0)-selectedPlan.valor,
        saldoEmCompra:(d.saldoEmCompra||0)+selectedPlan.valor
      });
      const snap2=await getDoc(doc(db,'users',currentUser.uid));
      userData=snap2.data();
      document.getElementById('comprasCount').textContent=`${userData.planos.length}/2`;
      renderPlans(planosIlimitado,'listIlimitado');
      renderPlans(planosCurto,'listCurto');
      closeConfirm();
      showAlert('ok','Compra Confirmada','O plano foi activado com sucesso. Os ganhos comecam a partir de amanha.');
    }catch(e){closeConfirm();showAlert('fail','Erro','Nao foi possivel processar. Tente novamente.');}
    btn.disabled=false;btn.textContent='Confirmar';
  };

  function showAlert(type,title,msg){
    const icons={
      warn:`<svg viewBox="0 0 24 24" fill="#E65100"><path d="M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-4h2v4z"/></svg>`,
      ok:`<svg viewBox="0 0 24 24" fill="#28A745"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>`,
      fail:`<svg viewBox="0 0 24 24" fill="#e74c3c"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>`
    };
    document.getElementById('alertIcon').className='alert-icon '+type;
    document.getElementById('alertIcon').innerHTML=icons[type];
    document.getElementById('alertTitle').textContent=title;
    document.getElementById('alertMsg').textContent=msg;
    document.getElementById('alertModal').classList.add('open');
  }

  onAuthStateChanged(auth,async user=>{
    if(!user){window.location.href='login.html';return;}
    currentUser=user;
    try{const snap=await getDoc(doc(db,'users',user.uid));userData=snap.data();}catch(e){}
    document.getElementById('comprasCount').textContent=`${userData?.planos?.length||0}/2`;
    document.getElementById('skeletonWrap').style.display='none';
    document.getElementById('panel-ilimitado').style.display='block';
    renderPlans(planosIlimitado,'listIlimitado');
    renderPlans(planosCurto,'listCurto');
  });
</script>
</body>
</html>
